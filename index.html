<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="theme-color" content="#0A0E14"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Porto"/>
<meta name="description" content="Pantau portofolio aset kamu secara real-time"/>
<title>Portofolio Tracker</title>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<link rel="icon" type="image/png" href="icon-192.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>

<style>
  :root {
    --bg-base: #0A0E14;
    --bg-card: #121822;
    --bg-card-hover: #161D29;
    --border-color: rgba(255, 255, 255, 0.08);
    --text-primary: #F0F6FF;
    --text-secondary: #8A9AAB;
    
    --accent-cyan: #00E5FF;
    --accent-cyan-dim: rgba(0, 229, 255, 0.1);
    --accent-green: #A3E635;
    --accent-red: #FF6B6B;
    
    --font-sans: 'Syne', sans-serif;
    --font-mono: 'DM Mono', monospace;
  }

  /* Reset & Base */
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
  html { background-color: var(--bg-base); } /* Memastikan warna dasar tembus ke ujung layar */
  body { 
    background-color: var(--bg-base); 
    color: var(--text-primary); 
    font-family: var(--font-sans); 
    overscroll-behavior: none; 
    min-height: 100vh;       /* Fallback */
    min-height: 100dvh;      /* Tinggi dinamis menyesuaikan layar asli */
    margin: 0;
  }
  body { overflow-x: hidden; }
  ::-webkit-scrollbar { display: none; }
  input, button { font-family: inherit; outline: none; border: none; background: none; }
  button { cursor: pointer; transition: all 0.2s ease; }
  button:active { transform: scale(0.96); }
  
  /* Typography */
  .mono { font-family: var(--font-mono); }
  .text-xs { font-size: 10px; letter-spacing: 1px; }
  .text-sm { font-size: 12px; }
  .text-base { font-size: 14px; }
  .text-lg { font-size: 16px; }
  .text-xl { font-size: 20px; }
  .font-bold { font-weight: 700; }
  .text-secondary { color: var(--text-secondary); }
  .text-cyan { color: var(--accent-cyan); }
  .text-green { color: var(--accent-green); }
  .text-red { color: var(--accent-red); }

  /* Layout & Components */
  .container { 
    width: 100%;
    max-width: 100%; /* Menghapus batasan 480px agar full layar */
    margin: 0 auto; 
    position: relative; 
    min-height: 100vh;
    min-height: 100dvh; 
    padding-bottom: 90px; 
  }
  
  .header {
    padding: 16px 20px;
    display: flex; justify-content: space-between; align-items: center;
    position: sticky; top: 0; z-index: 100;
    background: rgba(10, 14, 20, 0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border-color);
  }

  .btn-icon, .btn-outline {
    border: 1px solid var(--border-color);
    border-radius: 12px;
    padding: 8px 14px;
    color: var(--text-primary);
    font-weight: 600;
    display: flex; align-items: center; justify-content: center;
    background: rgba(255,255,255,0.03);
  }
  .btn-icon { padding: 8px 12px; font-size: 16px; }

  .hero-card {
    margin: 20px; padding: 24px;
    background: linear-gradient(145deg, #121822, #0D121A);
    border: 1px solid rgba(0, 229, 255, 0.15);
    border-radius: 24px;
    position: relative; overflow: hidden;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  }
  .hero-glow {
    position: absolute; right: -40px; top: -40px; width: 180px; height: 180px;
    border-radius: 50%; background: radial-gradient(circle, var(--accent-cyan-dim) 0%, transparent 70%);
  }

  .chips-container { display: flex; gap: 12px; padding: 0 20px 16px; overflow-x: auto; scroll-behavior: smooth; }
  .chip {
    flex-shrink: 0; background: var(--bg-card); border: 1px solid var(--border-color);
    border-radius: 16px; padding: 14px 16px; min-width: 110px;
  }

  .content-section { padding: 0 20px; }
  .card {
    background: var(--bg-card); border: 1px solid var(--border-color);
    border-radius: 20px; padding: 20px; margin-bottom: 16px;
  }
  .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }

  .list-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 16px 0; border-bottom: 1px solid var(--border-color);
  }
  .list-item:last-child { border-bottom: none; padding-bottom: 0; }
  .icon-box {
    width: 46px; height: 46px; border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 11px; flex-shrink: 0; text-transform: uppercase;
  }

  /* Progress Bar */
  .progress-bg { background: rgba(255,255,255,0.05); border-radius: 99px; height: 6px; overflow: hidden; margin-top: 6px;}
  .progress-fill { height: 100%; border-radius: 99px; transition: width 1s cubic-bezier(0.4, 0, 0.2, 1); }

  /* Bottom Nav */
  .bottom-nav {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 100%; 
    max-width: 100%; /* Menyesuaikan agar selaras dengan container */
    background: rgba(10, 14, 20, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid var(--border-color);
    display: flex; z-index: 100;
    padding-bottom: env(safe-area-inset-bottom, 0px);
  }
  .nav-item {
    flex: 1; padding: 12px 0 16px; display: flex; flex-direction: column; align-items: center; gap: 4px;
    color: var(--text-secondary); border-top: 2px solid transparent; transition: color 0.3s;
  }
  .nav-item.active { color: var(--accent-cyan); border-top-color: var(--accent-cyan); }
  .nav-icon { font-size: 20px; margin-bottom: 2px; }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(4px);
    z-index: 200; display: flex; flex-direction: column; justify-content: flex-end;
    opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
  }
  .modal-overlay.active { opacity: 1; pointer-events: auto; }
  .modal-content {
    background: var(--bg-base); border-radius: 24px 24px 0 0; border: 1px solid var(--border-color);
    border-bottom: none; max-height: 85vh; display: flex; flex-direction: column;
    transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .modal-overlay.active .modal-content { transform: translateY(0); }
  .drag-handle { width: 40px; height: 5px; border-radius: 5px; background: rgba(255,255,255,0.2); margin: 12px auto; }
  
  .input-group { margin-bottom: 16px; }
  .input-field {
    width: 100%; background: var(--bg-card); border: 1px solid var(--border-color);
    border-radius: 14px; color: var(--text-primary); padding: 14px 16px;
    font-size: 15px; transition: border-color 0.2s;
  }
  .input-field:focus { border-color: var(--accent-cyan); }
  .btn-primary {
    width: 100%; background: var(--text-primary); color: var(--bg-base);
    border-radius: 16px; padding: 16px; font-weight: 700; font-size: 16px; margin-top: 10px;
  }
  .btn-dashed {
    width: 100%; border: 1px dashed var(--border-color); border-radius: 14px;
    padding: 14px; font-size: 14px; color: var(--text-secondary); text-align: center;
  }

  /* Animations */
  .fade-in { animation: fadeIn 0.4s ease forwards; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>
<div id="app"></div>

<script>
// ── Core Config & Data ────────────────────────────────────────────────────────
const USD_IDR = 16300;
const CRYPTO_COLORS = ["#00E5FF", "#3B82F6", "#8B5CF6", "#06B6D4", "#0EA5E9"];
const SAHAM_COLORS  = ["#A3E635", "#84CC16", "#65A30D", "#4D7C0F", "#bef264"];
const CAT = { Kripto:"#00E5FF", Saham:"#A3E635", Emas:"#FBBF24", Tabungan:"#FF6B6B", Cash:"#A78BFA" };

const DEFAULT_PORTFOLIO = {
  crypto: [
    {id:"bitcoin", symbol:"BTC", name:"Bitcoin", amount:0.05},
    {id:"ethereum", symbol:"ETH", name:"Ethereum", amount:0.8},
    {id:"solana", symbol:"SOL", name:"Solana", amount:10},
  ],
  saham: [
    {ticker:"BBCA", name:"BCA", shares:100, priceIDR:10050},
    {ticker:"TLKM", name:"Telkom", shares:500, priceIDR:3200},
    {ticker:"ASII", name:"Astra", shares:200, priceIDR:5225},
  ],
  emas: {grams:50},
  tabungan: {principal:20000000, monthlyRate:0.008, months:6},
  cash: {amount:15000000},
};

function loadPortfolio(){
  try{ const s = localStorage.getItem('portfolio_v2'); return s ? JSON.parse(s) : DEFAULT_PORTFOLIO; }
  catch{ return DEFAULT_PORTFOLIO; }
}
function savePortfolio(p){ try{ localStorage.setItem('portfolio_v2', JSON.stringify(p)); }catch{} }

// ── Formatters ────────────────────────────────────────────────────────────────
const fmtIDR = n => new Intl.NumberFormat('id-ID', {style:'currency', currency:'IDR', maximumFractionDigits:0}).format(n);
const fmtC = n => {
  if(n >= 1e12) return 'Rp '+(n/1e12).toFixed(2)+' T';
  if(n >= 1e9) return 'Rp '+(n/1e9).toFixed(2)+' M';
  if(n >= 1e6) return 'Rp '+(n/1e6).toFixed(2)+' jt';
  return fmtIDR(n);
};
const compound = (p, r, m) => p * Math.pow(1+r, m);

// ── State ─────────────────────────────────────────────────────────────────────
let state = {
  portfolio: loadPortfolio(),
  prices: {},
  goldPrice: 0,
  loading: true,
  updated: null,
  tab: 'overview',
  editing: false,
  editSection: 'kripto',
  editDraft: null,
};

// ── Fetch Logic ───────────────────────────────────────────────────────────────
let fetchTimer = null;
async function fetchPrices(){
  state.loading = true; render();
  try {
    const ids = state.portfolio.crypto.map(c=>c.id).filter(Boolean).join(',');
    const [cr, gr] = await Promise.allSettled([
      fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${ids}&vs_currencies=usd&include_24hr_change=true`),
      fetch('https://api.metals.live/v1/spot/gold'),
    ]);
    if(cr.status === 'fulfilled' && cr.value.ok) state.prices = await cr.value.json();
    else state.prices = {bitcoin:{usd:87500,usd_24h_change:1.2}, ethereum:{usd:3400,usd_24h_change:-0.8}, solana:{usd:185,usd_24h_change:2.1}};
    
    if(gr.status === 'fulfilled' && gr.value.ok){
      const gd = await gr.value.json();
      state.goldPrice = (gd[0]?.price || 2350) * USD_IDR / 31.1035;
    } else state.goldPrice = 2350 * USD_IDR / 31.1035;
    
    state.updated = new Date();
  } catch {
    // Fallback dummy data if offline
    state.prices = {bitcoin:{usd:87500,usd_24h_change:1.2}, ethereum:{usd:3400,usd_24h_change:-0.8}, solana:{usd:185,usd_24h_change:2.1}};
    state.goldPrice = 2350 * USD_IDR / 31.1035;
    state.updated = new Date();
  }
  state.loading = false; render();
}

function startAutoRefresh(){
  if(fetchTimer) clearInterval(fetchTimer);
  fetchTimer = setInterval(fetchPrices, 5 * 60 * 1000);
}

// ── Calculations ──────────────────────────────────────────────────────────────
function compute(){
  const p = state.portfolio;
  const cryptoVals = p.crypto.map((c, i) => {
    const pr = state.prices[c.id]; const usd = pr?.usd || 0; const ch = pr?.usd_24h_change || 0;
    return {...c, priceUSD: usd, valueIDR: usd * USD_IDR * c.amount, change24h: ch, color: CRYPTO_COLORS[i%CRYPTO_COLORS.length]};
  });
  const sahamVals = p.saham.map((s, i) => ({...s, valueIDR: s.shares * s.priceIDR, color: SAHAM_COLORS[i%SAHAM_COLORS.length]}));
  const emasVal = state.goldPrice * p.emas.grams;
  const tabVal = compound(p.tabungan.principal, p.tabungan.monthlyRate, p.tabungan.months);
  const cashVal = p.cash.amount;
  
  const totCrypto = cryptoVals.reduce((a,c)=>a+c.valueIDR, 0);
  const totSaham = sahamVals.reduce((a,s)=>a+s.valueIDR, 0);
  const totAll = totCrypto + totSaham + emasVal + tabVal + cashVal || 1;
  
  const catPie = [
    {name:'Kripto', value:totCrypto, color:CAT.Kripto, pct:(totCrypto/totAll)*100},
    {name:'Saham', value:totSaham, color:CAT.Saham, pct:(totSaham/totAll)*100},
    {name:'Emas', value:emasVal, color:CAT.Emas, pct:(emasVal/totAll)*100},
    {name:'Tabungan', value:tabVal, color:CAT.Tabungan, pct:(tabVal/totAll)*100},
    {name:'Cash', value:cashVal, color:CAT.Cash, pct:(cashVal/totAll)*100},
  ].filter(d=>d.value > 0);
  
  const detPie = [
    ...cryptoVals.map(c=>({name:c.symbol, value:c.valueIDR, color:c.color, pct:(c.valueIDR/totAll)*100})),
    ...sahamVals.map(s=>({name:s.ticker, value:s.valueIDR, color:s.color, pct:(s.valueIDR/totAll)*100})),
    {name:'Emas', value:emasVal, color:CAT.Emas, pct:(emasVal/totAll)*100},
    {name:'Tabungan', value:tabVal, color:CAT.Tabungan, pct:(tabVal/totAll)*100},
    {name:'Cash', value:cashVal, color:CAT.Cash, pct:(cashVal/totAll)*100},
  ].filter(d=>d.value > 0);
  
  const wChange = totCrypto > 0 ? cryptoVals.reduce((a,c)=>a+(c.change24h*c.valueIDR), 0) / totAll : 0;
  
  return {cryptoVals, sahamVals, emasVal, tabVal, cashVal, totCrypto, totSaham, totAll, catPie, detPie, wChange};
}

// ── Canvas Donut Chart ────────────────────────────────────────────────────────
function drawDonut(canvas, data, cx, cy, outerR, innerR){
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  canvas.width = canvas.offsetWidth * dpr;
  canvas.height = canvas.offsetHeight * dpr;
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, canvas.offsetWidth, canvas.offsetHeight);
  
  const total = data.reduce((a,d)=>a+d.value, 0) || 1;
  let angle = -Math.PI/2;
  const gap = 0.04; // Smoother gap
  
  data.forEach(d => {
    const sweep = (d.value/total) * Math.PI * 2 - gap;
    ctx.beginPath();
    ctx.arc(cx, cy, outerR, angle, angle + sweep);
    ctx.arc(cx, cy, innerR, angle + sweep, angle, true);
    ctx.closePath();
    ctx.fillStyle = d.color;
    ctx.fill();
    angle += sweep + gap;
  });
}

// ── Render Templates ──────────────────────────────────────────────────────────
let renderScheduled = false;
function render(){
  if(renderScheduled) return;
  renderScheduled = true;
  requestAnimationFrame(() => { renderScheduled = false; _render(); });
}

function _render(){
  const {cryptoVals, sahamVals, emasVal, tabVal, cashVal, totCrypto, totSaham, totAll, catPie, detPie, wChange} = compute();
  const p = state.portfolio;

  // Header
  const header = `
    <header class="header">
      <div>
        <div class="text-lg font-bold" style="letter-spacing: -0.5px">◈ PORTO<span class="text-cyan">FOLIO</span></div>
        <div class="mono text-xs text-secondary mt-1">
          ${state.updated ? 'Update: ' + state.updated.toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'}) : 'Memuat...'}
        </div>
      </div>
      <div style="display:flex; gap:10px">
        <button class="btn-icon" onclick="fetchPrices()">
           <span style="opacity: ${state.loading ? '0.5' : '1'}; transition: opacity 0.3s">⟳</span>
        </button>
        <button class="btn-outline" onclick="openEdit()">✎ Edit</button>
      </div>
    </header>`;

  // Hero Section
  const isUp = wChange >= 0;
  const hero = `
    <section class="hero-card">
      <div class="hero-glow"></div>
      <div class="mono text-xs text-secondary mb-2 uppercase tracking-wide">Total Keseimbangan</div>
      <div class="font-bold" style="font-size: 36px; line-height: 1.1; letter-spacing: -1px; margin-bottom: 12px;">
        ${fmtC(totAll)}
      </div>
      <div style="display:flex; gap:10px; align-items:center;">
        <div class="mono text-sm ${isUp ? 'text-green' : 'text-red'}">
          ${isUp ? '▲' : '▼'} ${Math.abs(wChange).toFixed(2)}% kripto 24j
        </div>
        <div style="background: var(--accent-cyan-dim); color: var(--accent-cyan); padding: 4px 10px; border-radius: 99px; font-size: 10px; font-weight: 600;" class="mono">
          ● LIVE
        </div>
      </div>
    </section>`;

  // Horizontal Chips
  const chips = `
    <section class="chips-container">
      ${catPie.map(c => `
        <div class="chip" style="border-color: ${c.color}33;">
          <div class="mono text-xs mb-1" style="color: ${c.color};">${c.name.toUpperCase()}</div>
          <div class="font-bold text-base">${fmtC(c.value)}</div>
          <div class="mono text-xs text-secondary mt-1">${c.pct.toFixed(1)}%</div>
        </div>
      `).join('')}
    </section>`;

  // Helper for legend
  const legendRows = (data) => data.map(d => `
    <div style="display:flex; align-items:center; gap:8px;">
      <div style="width:10px; height:10px; border-radius:50%; background:${d.color};"></div>
      <span class="mono text-xs text-secondary">${d.name}</span>
      <span class="mono text-xs" style="color:${d.color}">${d.pct.toFixed(1)}%</span>
    </div>`).join('');

  // Tabs Content
  let tabContent = '';
  
  if(state.tab === 'overview'){
    tabContent = `
      <div class="card fade-in">
        <div class="mono text-xs text-secondary mb-4">DIVERSIFIKASI KATEGORI</div>
        <div style="position:relative; height:200px; margin-bottom: 20px;">
          <canvas id="donut1" style="width:100%; height:100%"></canvas>
        </div>
        <div style="display:flex; flex-wrap:wrap; gap:12px; justify-content: center;">${legendRows(catPie)}</div>
      </div>
      <div class="card fade-in" style="animation-delay: 0.1s">
        <div class="mono text-xs text-secondary mb-4">DISTRIBUSI NILAI</div>
        ${catPie.map(c => `
          <div style="margin-bottom:16px;">
            <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
              <span class="font-bold text-sm" style="color:${c.color}">${c.name}</span>
              <span class="mono text-sm">${fmtC(c.value)} <span class="text-secondary">(${c.pct.toFixed(1)}%)</span></span>
            </div>
            <div class="progress-bg">
              <div class="progress-fill" style="width:${c.pct}%; background:linear-gradient(90deg, ${c.color}, ${c.color}88);"></div>
            </div>
          </div>
        `).join('')}
      </div>`;
  } 
  else if (state.tab === 'kripto') {
    tabContent = `
      <div class="card fade-in">
        <div class="card-header">
          <div class="mono text-xs text-secondary">ASET KRIPTO</div>
          <div class="mono text-base font-bold text-cyan">${fmtC(totCrypto)}</div>
        </div>
        ${cryptoVals.map(c => `
          <div class="list-item">
            <div style="display:flex; gap:14px; align-items:center;">
              <div class="icon-box" style="background:${c.color}22; color:${c.color};">${c.symbol}</div>
              <div>
                <div class="font-bold text-lg">${c.name}</div>
                <div class="mono text-xs text-secondary mt-1">${c.amount} ${c.symbol} &middot; $${c.priceUSD.toLocaleString('en-US',{maximumFractionDigits:0})}</div>
              </div>
            </div>
            <div style="text-align:right;">
              <div class="font-bold text-base">${fmtC(c.valueIDR)}</div>
              <div class="mono text-xs mt-1 ${c.change24h >= 0 ? 'text-green' : 'text-red'}">
                ${c.change24h >= 0 ? '▲' : '▼'} ${Math.abs(c.change24h).toFixed(2)}%
              </div>
            </div>
          </div>
        `).join('')}
      </div>`;
  }
  else if (state.tab === 'saham') {
    tabContent = `
      <div class="card fade-in">
        <div class="card-header">
          <div class="mono text-xs text-secondary">PORTOFOLIO SAHAM</div>
          <div class="mono text-base font-bold text-green">${fmtC(totSaham)}</div>
        </div>
        ${sahamVals.map(s => `
          <div class="list-item">
            <div style="display:flex; gap:14px; align-items:center;">
              <div class="icon-box" style="background:${s.color}22; color:${s.color};">${s.ticker}</div>
              <div>
                <div class="font-bold text-lg" style="color:${s.color}">${s.ticker}</div>
                <div class="text-xs text-secondary mt-1">${s.name} &middot; ${(s.shares/100).toFixed(0)} Lot</div>
              </div>
            </div>
            <div style="text-align:right;">
              <div class="font-bold text-base">${fmtC(s.valueIDR)}</div>
              <div class="mono text-xs text-secondary mt-1">${fmtIDR(s.priceIDR)}/lbr</div>
            </div>
          </div>
        `).join('')}
      </div>`;
  }
  else if (state.tab === 'lainnya') {
    tabContent = `
      <div class="card fade-in">
        <div class="mono text-xs text-secondary mb-3">EMAS FISIK</div>
        <div style="display:flex; justify-content:space-between; align-items:flex-end;">
          <div>
            <div class="font-bold text-xl">${p.emas.grams}<span class="text-sm text-secondary font-normal"> gr</span></div>
            <div class="mono text-xs text-secondary mt-1">${fmtC(state.goldPrice)}/gr</div>
          </div>
          <div class="font-bold text-xl" style="color:${CAT.Emas}">${fmtC(emasVal)}</div>
        </div>
      </div>
      <div class="card fade-in" style="animation-delay: 0.1s">
        <div class="mono text-xs text-secondary mb-3">TABUNGAN / DEPOSITO</div>
        <div style="display:flex; justify-content:space-between; margin-bottom:16px;">
          <div>
            <div class="mono text-xs text-secondary mb-1">Pokok</div>
            <div class="font-bold text-base">${fmtC(p.tabungan.principal)}</div>
          </div>
          <div style="text-align:right;">
            <div class="mono text-xs text-secondary mb-1">Bunga / ${p.tabungan.months} Bln</div>
            <div class="font-bold text-base" style="color:${CAT.Tabungan}">${(p.tabungan.monthlyRate*100).toFixed(1)}%</div>
          </div>
        </div>
        <div style="display:flex; justify-content:space-between; align-items:center; padding-top:16px; border-top: 1px solid var(--border-color);">
          <div class="text-sm text-secondary">Estimasi Nilai</div>
          <div class="font-bold text-lg">${fmtC(tabVal)}</div>
        </div>
      </div>
      <div class="card fade-in" style="animation-delay: 0.2s">
        <div class="mono text-xs text-secondary mb-2">CASH / TUNAI</div>
        <div style="display:flex; justify-content:space-between; align-items:center;">
          <div class="font-bold text-2xl" style="color:${CAT.Cash}">${fmtC(cashVal)}</div>
          <div class="mono text-sm text-secondary">${((cashVal/totAll)*100).toFixed(1)}% porsi</div>
        </div>
      </div>`;
  }

  // Bottom Navigation
  const navItems = [
    {id:'overview', icon:'⊞', label:'Porto'},
    {id:'kripto',   icon:'◈', label:'Kripto'},
    {id:'saham',    icon:'▲', label:'Saham'},
    {id:'lainnya',  icon:'◎', label:'Lainnya'}
  ];
  const nav = `
    <nav class="bottom-nav">
      ${navItems.map(n => `
        <button class="nav-item ${state.tab === n.id ? 'active' : ''}" onclick="setTab('${n.id}')">
          <span class="nav-icon">${n.icon}</span>
          <span class="mono text-xs">${n.label}</span>
        </button>
      `).join('')}
    </nav>`;

  // Edit Modal Editor
  let editModal = '';
  if(state.editDraft){
    const d = state.editDraft;
    const sec = state.editSection;
    const sections = ['kripto','saham','emas','tabungan','cash'];
    
    const inp = (id, label, val, num=false) => `
      <div class="input-group">
        <div class="mono text-xs text-secondary mb-2 uppercase">${label}</div>
        <input id="${id}" class="input-field mono" type="${num?'text':'text'}" inputmode="${num?'decimal':'text'}" 
               value="${val}" oninput="handleEditInput('${id}',this.value)"/>
      </div>`;

    let secContent = '';
    if(sec === 'kripto'){
      secContent = d.crypto.map((c,i) => `
        <div class="card" style="padding:16px;">
          <div class="card-header" style="margin-bottom:12px;">
            <span class="font-bold text-cyan">${c.symbol || 'Baru'}</span>
            <button onclick="delCrypto(${i})" style="color:var(--accent-red); font-size:13px; font-weight:600;">Hapus</button>
          </div>
          ${inp(`ci${i}0`,'ID CoinGecko',c.id)}
          ${inp(`ci${i}1`,'Simbol',c.symbol)}
          ${inp(`ci${i}2`,'Nama',c.name)}
          ${inp(`ci${i}3`,'Jumlah Koin',c.amount,true)}
        </div>`).join('') + 
        `<button class="btn-dashed" style="color:var(--accent-cyan); border-color:var(--accent-cyan-dim)" onclick="addCrypto()">+ Tambah Kripto</button>`;
    }
    else if(sec === 'saham'){
      secContent = d.saham.map((s,i) => `
        <div class="card" style="padding:16px;">
          <div class="card-header" style="margin-bottom:12px;">
            <span class="font-bold text-green">${s.ticker || 'Baru'}</span>
            <button onclick="delSaham(${i})" style="color:var(--accent-red); font-size:13px; font-weight:600;">Hapus</button>
          </div>
          ${inp(`si${i}0`,'Kode Saham',s.ticker)}
          ${inp(`si${i}1`,'Nama Perusahaan',s.name)}
          ${inp(`si${i}2`,'Jumlah Lembar',s.shares,true)}
          ${inp(`si${i}3`,'Harga (Rp)',s.priceIDR,true)}
        </div>`).join('') + 
        `<button class="btn-dashed" style="color:var(--accent-green); border-color:rgba(163, 230, 53, 0.2)" onclick="addSaham()">+ Tambah Saham</button>`;
    }
    else if(sec === 'emas') secContent = inp('emas_g','Jumlah Gram',d.emas.grams,true);
    else if(sec === 'tabungan') secContent = inp('tab_p','Pokok (Rp)',d.tabungan.principal,true) + inp('tab_r','Bunga Bulanan (0.008 = 0.8%)',d.tabungan.monthlyRate,true) + inp('tab_m','Durasi (Bulan)',d.tabungan.months,true);
    else if(sec === 'cash') secContent = inp('cash_a','Total Tunai (Rp)',d.cash.amount,true);

    editModal = `
      <div class="modal-overlay ${state.editing ? 'active' : ''}" onclick="closeEdit()">
        <div class="modal-content" onclick="event.stopPropagation()">
          <div class="drag-handle"></div>
          <div style="display:flex; justify-content:space-between; align-items:center; padding:10px 24px 16px;">
            <span class="font-bold text-lg">Edit Portofolio</span>
            <button onclick="closeEdit()" style="color:var(--text-secondary); font-size:24px;">&times;</button>
          </div>
          <div style="display:flex; gap:10px; padding:0 24px 16px; overflow-x:auto; border-bottom:1px solid var(--border-color); margin-bottom:16px;">
            ${sections.map(s => `
              <button onclick="setEditSec('${s}')" style="padding:8px 16px; border-radius:99px; white-space:nowrap; font-weight:${sec===s?700:500}; 
                background:${sec===s?'var(--text-primary)':'rgba(255,255,255,0.05)'}; 
                color:${sec===s?'var(--bg-base)':'var(--text-secondary)'};">
                ${s.charAt(0).toUpperCase() + s.slice(1)}
              </button>
            `).join('')}
          </div>
          <div style="overflow-y:auto; padding:0 24px 20px; flex:1;">${secContent}</div>
          <div style="padding:16px 24px 30px; border-top:1px solid var(--border-color);">
            <button class="btn-primary" onclick="saveEdit()">Simpan Perubahan</button>
          </div>
        </div>
      </div>`;
  }

  // Inject HTML
  document.getElementById('app').innerHTML = `
    <div class="container">
      ${header}
      ${hero}
      ${chips}
      <main class="content-section">${tabContent}</main>
      ${nav}
      ${editModal}
    </div>`;

  // Draw Canvas Charts
  if(state.tab === 'overview'){
    requestAnimationFrame(()=>{
      const d1 = document.getElementById('donut1');
      if(d1){
        const w = d1.offsetWidth, h = d1.offsetHeight;
        drawDonut(d1, catPie, w/2, h/2, Math.min(w,h)*0.45, Math.min(w,h)*0.28);
      }
    });
  }
}

// ── Handlers ──────────────────────────────────────────────────────────────────
function setTab(t){ state.tab=t; render(); }
function openEdit(){ state.editDraft=JSON.parse(JSON.stringify(state.portfolio)); state.editing=true; render(); }
function closeEdit(){ state.editing=false; setTimeout(()=>{state.editDraft=null; render();}, 300); render(); }
function setEditSec(s){ state.editSection=s; render(); }

function handleEditInput(id, val){
  if(!state.editDraft) return;
  const d = state.editDraft;
  if(id.startsWith('ci')){
    const i=parseInt(id[2]), f=parseInt(id[3]);
    const fields=['id','symbol','name','amount'];
    if(f===3) d.crypto[i].amount = parseFloat(val)||0; else d.crypto[i][fields[f]] = val;
  } else if(id.startsWith('si')){
    const i=parseInt(id[2]), f=parseInt(id[3]);
    const fields=['ticker','name','shares','priceIDR'];
    if(f>=2) d.saham[i][fields[f]] = parseFloat(val)||0; else d.saham[i][fields[f]] = val;
  } else if(id==='emas_g') d.emas.grams = parseFloat(val)||0;
  else if(id==='tab_p') d.tabungan.principal = parseFloat(val)||0;
  else if(id==='tab_r') d.tabungan.monthlyRate = parseFloat(val)||0;
  else if(id==='tab_m') d.tabungan.months = parseInt(val)||0;
  else if(id==='cash_a') d.cash.amount = parseFloat(val)||0;
}

function addCrypto(){ state.editDraft.crypto.push({id:'',symbol:'',name:'',amount:0}); render(); }
function delCrypto(i){ state.editDraft.crypto.splice(i,1); render(); }
function addSaham(){ state.editDraft.saham.push({ticker:'',name:'',shares:0,priceIDR:0}); render(); }
function delSaham(i){ state.editDraft.saham.splice(i,1); render(); }

function saveEdit(){
  state.portfolio = JSON.parse(JSON.stringify(state.editDraft));
  savePortfolio(state.portfolio);
  closeEdit();
  setTimeout(fetchPrices, 300);
}

// ── Initialization ────────────────────────────────────────────────────────────
if('serviceWorker' in navigator){
  window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(()=>{}));
}

render();
fetchPrices();
startAutoRefresh();
</script>
</body>
</html>
