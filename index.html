<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#080C10"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Porto"/>
<title>Portofolio Tracker</title>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<link rel="icon" type="image/png" href="icon-192.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
/* ════════════════════════════════════════════
   RESET
════════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{
  background:#080C10;color:#F0F6FF;
  font-family:'Syne',sans-serif;
  overscroll-behavior:none;
  height:100%;width:100%;
  overflow:hidden; /* no body scroll — each zone scrolls itself */
}
::-webkit-scrollbar{display:none}
*{scrollbar-width:none}
input,button{-webkit-appearance:none;appearance:none;font-family:inherit}
button{cursor:pointer}

/* ════════════════════════════════════════════
   DESIGN TOKENS — portrait base
════════════════════════════════════════════ */
:root{
  --bg:       #080C10;
  --bg2:      #0D1117;
  --border:   #1E2530;
  --muted:    #556070;
  --text:     #F0F6FF;
  --accent:   #00E5FF;

  /* Fluid type: scales with the SMALLER of vw/vh so both orientations feel right */
  --fs-xs:   clamp(9px,  2vmin, 11px);
  --fs-sm:   clamp(11px, 2.6vmin,13px);
  --fs-md:   clamp(13px, 3.2vmin,16px);
  --fs-lg:   clamp(15px, 3.8vmin,19px);
  --fs-xl:   clamp(18px, 4.8vmin,26px);
  --fs-hero: clamp(24px, 6.5vmin,40px);

  /* Fluid spacing */
  --sp-xs: clamp(4px,  1vmin, 7px);
  --sp-sm: clamp(7px,  2vmin,13px);
  --sp-md: clamp(11px, 3vmin,18px);
  --sp-lg: clamp(14px, 4vmin,24px);

  /* Component sizes */
  --icon:    clamp(36px, 9vmin, 50px);
  --r-sm:    clamp(8px,  2vmin,12px);
  --r-md:    clamp(12px, 3vmin,18px);
  --r-lg:    clamp(16px, 4vmin,22px);
  --r-xl:    clamp(18px, 4.5vmin,26px);
  --chart-h: clamp(150px,35vmin,220px);

  /* Safe areas */
  --safe-t: env(safe-area-inset-top,    0px);
  --safe-b: env(safe-area-inset-bottom, 0px);
  --safe-l: env(safe-area-inset-left,   0px);
  --safe-r: env(safe-area-inset-right,  0px);

  /* Layout dimensions (overridden per orientation below) */
  --nav-w: 0px;   /* sidebar width in landscape */
  --nav-h: clamp(54px,14vmin,68px); /* bottom nav height in portrait */
}

/* ════════════════════════════════════════════
   ANIMATIONS
════════════════════════════════════════════ */
.slide-up { animation: slideUp .28s cubic-bezier(.32,.72,0,1) }
.fade-in  { animation: fadeIn  .22s ease }
@keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
@keyframes fadeIn  { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }

/* ════════════════════════════════════════════
   APP SHELL  –  fills the viewport exactly
════════════════════════════════════════════ */
#app{
  position:fixed;inset:0;
  display:flex;
  flex-direction:column;   /* portrait: column */
  overflow:hidden;
}

/* ── Top header (portrait) ── */
#hdr{
  flex-shrink:0;
  background:#080C10EE;
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  padding:calc(var(--sp-sm) + var(--safe-t)) var(--sp-md) var(--sp-sm);
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:var(--sp-sm);
}
.hdr-logo{font-size:var(--fs-lg);font-weight:800;letter-spacing:-.5px;line-height:1.1}
.hdr-logo span{color:var(--accent)}
.hdr-sub{font-family:'DM Mono',monospace;color:var(--muted);font-size:var(--fs-xs);margin-top:2px}
.hdr-btns{display:flex;gap:var(--sp-xs);flex-shrink:0}
.btn-hdr{
  border:1px solid;border-radius:var(--r-sm);
  padding:clamp(7px,1.8vmin,11px) clamp(10px,2.5vmin,16px);
  font-size:var(--fs-sm);font-weight:600;line-height:1;
  transition:opacity .15s;
}
.btn-hdr:active{opacity:.7}

/* ── Main body row (header is above, nav is below in portrait) ── */
#body{
  flex:1;
  display:flex;
  flex-direction:row;
  overflow:hidden;
  min-height:0; /* critical for flex children to scroll */
}

/* ── Sidebar nav (landscape) – hidden in portrait ── */
#sidenav{
  display:none; /* shown in landscape via media query */
  flex-direction:column;
  align-items:stretch;
  background:#080C10F0;
  border-right:1px solid var(--border);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  flex-shrink:0;
  width:var(--nav-w);
  padding-top:var(--sp-sm);
  padding-bottom:calc(var(--sp-sm) + var(--safe-b));
  padding-left:var(--safe-l);
  overflow-y:auto;
  gap:var(--sp-xs);
  z-index:50;
}
.side-btn{
  display:flex;align-items:center;gap:var(--sp-sm);
  background:none;border:none;
  padding:clamp(10px,2.5vmin,14px) var(--sp-md);
  border-radius:var(--r-md);
  margin:0 var(--sp-xs);
  color:var(--muted);font-size:var(--fs-sm);
  transition:all .15s;text-align:left;
}
.side-btn.active{background:#00E5FF11;color:#F0F6FF;border-left:3px solid var(--accent)}
.side-btn:not(.active){border-left:3px solid transparent}
.side-icon{font-size:var(--fs-md);flex-shrink:0}
.side-lbl{font-family:'DM Mono',monospace;letter-spacing:.5px}

/* ── Scroll area ── */
#scroll{
  flex:1;
  overflow-y:auto;
  overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  min-width:0;
}
#content{
  padding:var(--sp-sm);
  padding-bottom:calc(var(--nav-h) + var(--safe-b) + var(--sp-md));
}

/* ── Bottom nav (portrait) ── */
#botnav{
  flex-shrink:0;
  display:flex;
  background:#0D1117F5;
  border-top:1px solid var(--border);
  backdrop-filter:blur(24px);
  -webkit-backdrop-filter:blur(24px);
  padding-bottom:var(--safe-b);
  z-index:50;
}
.bot-btn{
  flex:1;background:none;border:none;
  border-top:2px solid transparent;
  padding:var(--sp-sm) 0;
  display:flex;flex-direction:column;align-items:center;gap:3px;
  color:var(--muted);transition:all .15s;
}
.bot-btn.active{border-top-color:var(--accent);color:#F0F6FF}
.bot-icon{font-size:clamp(15px,4.5vmin,21px);line-height:1}
.bot-lbl{font-family:'DM Mono',monospace;font-size:var(--fs-xs);letter-spacing:.5px}

/* ════════════════════════════════════════════
   LANDSCAPE — side-by-side layout
════════════════════════════════════════════ */
@media (orientation: landscape) {
  :root{
    --nav-w: clamp(110px, 22vw, 160px);
    --nav-h: 0px; /* no bottom nav */
    /* In landscape, vmin ≈ vh (the short axis), so font tokens auto-compress */
  }
  #app{ flex-direction:column } /* keep top header */
  #sidenav{ display:flex }
  #botnav{ display:none }
  #content{
    /* no extra bottom pad for nav in landscape */
    padding-bottom:var(--sp-md);
  }
  /* In landscape, hero can be more compact */
  .hero{ padding:var(--sp-sm) var(--sp-md) }
  .hero-value{ font-size:clamp(22px,5vmin,36px) }
  /* Two-column grid for overview cards in landscape */
  .ls-grid{ display:grid; grid-template-columns:1fr 1fr; gap:var(--sp-sm) }
  .ls-full{ grid-column:1/-1 }
  /* Tighter chart height in landscape */
  --chart-h: clamp(120px, 28vmin, 170px);
}

/* ════════════════════════════════════════════
   CONTENT COMPONENTS
════════════════════════════════════════════ */

/* Hero */
.hero{
  background:linear-gradient(135deg,#0D1117,#0A1520);
  border:1px solid var(--border);
  border-radius:var(--r-xl);
  padding:var(--sp-lg) var(--sp-md);
  margin-bottom:var(--sp-sm);
  position:relative;overflow:hidden;
}
.hero::after{
  content:'';position:absolute;right:-8%;top:-25%;
  width:40%;aspect-ratio:1;border-radius:50%;
  background:radial-gradient(circle,#00E5FF08 0%,transparent 70%);
  pointer-events:none;
}
.hero-lbl{font-family:'DM Mono',monospace;color:var(--muted);font-size:var(--fs-xs);letter-spacing:2px;margin-bottom:var(--sp-xs)}
.hero-val{font-size:var(--fs-hero);font-weight:800;letter-spacing:-2px;line-height:1}
.hero-meta{display:flex;gap:var(--sp-sm);margin-top:var(--sp-sm);align-items:center;flex-wrap:wrap}
.hero-ch{font-family:'DM Mono',monospace;font-size:var(--fs-sm)}
.pill{background:#00E5FF22;color:var(--accent);border:1px solid #00E5FF44;border-radius:999px;padding:2px var(--sp-sm);font-family:'DM Mono',monospace;font-size:var(--fs-xs)}

/* Chips row */
.chips{display:flex;gap:var(--sp-xs);overflow-x:auto;-webkit-overflow-scrolling:touch;margin-bottom:var(--sp-sm);padding-bottom:2px}
.chip{flex-shrink:0;background:var(--bg2);border-radius:var(--r-md);padding:var(--sp-sm) var(--sp-md);min-width:clamp(85px,22vw,115px);border:1px solid}
.chip-cat{font-family:'DM Mono',monospace;font-size:var(--fs-xs);letter-spacing:1px}
.chip-val{font-weight:700;font-size:var(--fs-md);margin-top:3px}
.chip-pct{font-family:'DM Mono',monospace;color:var(--muted);font-size:var(--fs-sm);margin-top:1px}

/* Cards */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-lg);padding:var(--sp-md);margin-bottom:var(--sp-sm)}
.card-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:var(--sp-sm)}
.card-lbl{font-family:'DM Mono',monospace;color:var(--muted);font-size:var(--fs-xs);letter-spacing:2px}
.card-total{font-family:'DM Mono',monospace;font-size:var(--fs-md);font-weight:600}

/* Chart */
.chart-wrap{position:relative;width:100%;height:var(--chart-h)}
canvas.donut{width:100%;height:100%;display:block}

/* Legend */
.legend{display:flex;flex-wrap:wrap;gap:clamp(5px,1.5vmin,9px) clamp(9px,3vmin,15px);margin-top:var(--sp-sm)}
.leg-item{display:flex;align-items:center;gap:5px}
.leg-dot{width:clamp(6px,1.8vmin,9px);height:clamp(6px,1.8vmin,9px);border-radius:50%;flex-shrink:0}
.leg-txt{font-family:'DM Mono',monospace;font-size:var(--fs-xs);color:#A0AFBF}
.leg-pct{font-family:'DM Mono',monospace;font-size:var(--fs-xs)}

/* Bar chart */
.bar-row{margin-bottom:clamp(10px,2.5vmin,16px)}
.bar-hdr{display:flex;justify-content:space-between;margin-bottom:5px;align-items:baseline;gap:var(--sp-xs)}
.bar-name{font-size:var(--fs-sm);font-weight:600;flex-shrink:0}
.bar-val{font-family:'DM Mono',monospace;font-size:var(--fs-xs);color:#A0AFBF;text-align:right}
.bar-track{background:var(--border);border-radius:999px;height:clamp(5px,1.5vmin,8px);overflow:hidden}
.bar-fill{height:100%;border-radius:999px;transition:width 1s ease}

/* Asset rows */
.asset-row{display:flex;justify-content:space-between;align-items:center;padding:var(--sp-sm) 0}
.asset-row+.asset-row{border-top:1px solid #1E253044}
.asset-icon{
  width:var(--icon);height:var(--icon);border-radius:var(--r-sm);
  display:flex;align-items:center;justify-content:center;
  font-family:'DM Mono',monospace;font-size:var(--fs-xs);font-weight:700;
  flex-shrink:0;text-align:center;padding:0 2px;
}
.asset-left{display:flex;align-items:center;gap:var(--sp-sm)}
.asset-name{font-weight:700;font-size:var(--fs-md)}
.asset-sub{font-family:'DM Mono',monospace;color:var(--muted);font-size:var(--fs-xs);margin-top:2px}
.asset-right{text-align:right}
.asset-val{font-weight:700;font-size:var(--fs-md)}
.asset-ch{font-family:'DM Mono',monospace;font-size:var(--fs-sm);margin-top:2px}

/* Info grid */
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:var(--sp-sm);margin-bottom:var(--sp-sm)}
.info-box{background:var(--border);border-radius:var(--r-sm);padding:var(--sp-sm)}
.info-lbl{font-family:'DM Mono',monospace;color:var(--muted);font-size:var(--fs-xs);margin-bottom:4px}
.info-val{font-weight:700;font-size:var(--fs-md)}

/* Infobar */
.infobar{background:var(--border);border-radius:var(--r-sm);padding:var(--sp-sm) var(--sp-md);margin-top:var(--sp-sm);display:flex;justify-content:space-between;align-items:center;gap:var(--sp-sm)}
.infobar-lbl{font-family:'DM Mono',monospace;color:var(--muted);font-size:var(--fs-xs)}
.infobar-val{font-family:'DM Mono',monospace;font-size:var(--fs-xs)}

/* ════════════════════════════════════════════
   EDIT MODAL
════════════════════════════════════════════ */
#edit-ov{
  position:fixed;inset:0;
  background:#000000CC;
  z-index:200;
  display:none;flex-direction:column;justify-content:flex-end;
}
#edit-sheet{
  background:#080C10;
  border-radius:var(--r-xl) var(--r-xl) 0 0;
  border:1px solid var(--border);border-bottom:none;
  max-height:88vh;
  display:flex;flex-direction:column;
}
/* In landscape, modal is centered panel instead */
@media (orientation:landscape){
  #edit-ov{justify-content:center;align-items:center}
  #edit-sheet{
    max-height:90vh;width:min(520px,90vw);
    border-radius:var(--r-xl);border:1px solid var(--border);
    animation:fadeIn .22s ease;
  }
  .edit-handle-wrap{display:none}
}
.edit-handle-wrap{display:flex;justify-content:center;padding:var(--sp-sm) 0 0}
.edit-handle{width:clamp(28px,8vw,40px);height:4px;border-radius:999px;background:var(--border)}
.edit-top{display:flex;justify-content:space-between;align-items:center;padding:var(--sp-sm) var(--sp-md) var(--sp-xs)}
.edit-title{font-size:var(--fs-lg);font-weight:700}
.edit-x{background:var(--border);border:none;color:#A0AFBF;width:clamp(28px,7vmin,36px);height:clamp(28px,7vmin,36px);border-radius:50%;font-size:var(--fs-md);display:flex;align-items:center;justify-content:center}
.edit-tabs{display:flex;gap:var(--sp-xs);padding:var(--sp-xs) var(--sp-md);overflow-x:auto;flex-shrink:0}
.etab{border:none;border-radius:999px;padding:clamp(6px,1.5vmin,9px) clamp(10px,3vmin,16px);font-family:'Syne',sans-serif;font-size:var(--fs-sm);white-space:nowrap;flex-shrink:0;transition:all .15s}
.edit-body{overflow-y:auto;-webkit-overflow-scrolling:touch;padding:var(--sp-xs) var(--sp-md) var(--sp-sm);flex:1}
.edit-foot{padding:0 var(--sp-md) calc(var(--sp-lg) + var(--safe-b));flex-shrink:0}
.btn-save{width:100%;background:#F0F6FF;border:none;border-radius:var(--r-md);padding:clamp(12px,3vmin,16px) 0;font-family:'Syne',sans-serif;font-size:var(--fs-md);font-weight:700;color:#080C10}
.ecard{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-md);padding:var(--sp-sm);margin-bottom:var(--sp-xs)}
.ecard-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:var(--sp-sm)}
.ecard-nm{font-weight:700;font-size:var(--fs-md)}
.btn-del{border:none;border-radius:var(--r-sm);padding:clamp(4px,1vmin,7px) clamp(8px,2.5vmin,14px);background:#FF6B6B22;color:#FF6B6B;font-size:var(--fs-sm)}
.flbl{font-family:'DM Mono',monospace;color:var(--muted);font-size:var(--fs-xs);letter-spacing:1px;margin-bottom:4px}
.finp{width:100%;background:#080C10;border:1px solid var(--border);border-radius:var(--r-sm);color:#F0F6FF;padding:clamp(10px,2.5vmin,14px);font-family:'DM Mono',monospace;font-size:var(--fs-md);outline:none;margin-bottom:var(--sp-sm);transition:border-color .15s}
.finp:focus{border-color:#1E3545}
.btn-add{width:100%;border-radius:var(--r-sm);padding:clamp(10px,2.5vmin,14px) 0;font-family:'DM Mono',monospace;font-size:var(--fs-sm)}

/* Install banner */
#ibanner{position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:640px;background:var(--accent);color:#080C10;padding:var(--sp-sm) var(--sp-md);display:flex;justify-content:space-between;align-items:center;z-index:999;font-size:var(--fs-sm);font-weight:600}
</style>
</head>
<body>

<div id="app">
  <!-- Top header — always visible -->
  <div id="hdr"></div>

  <!-- Body: sidebar (landscape) + scroll area -->
  <div id="body">
    <div id="sidenav"></div>
    <div id="scroll">
      <div id="content" class="fade-in"></div>
    </div>
  </div>

  <!-- Bottom nav — portrait only -->
  <div id="botnav"></div>

  <!-- Edit overlay -->
  <div id="edit-ov"></div>
</div>

<script>
'use strict';

/* ════════════════════════════════════════════
   CONSTANTS
════════════════════════════════════════════ */
const USD_IDR=16300;
const CC=["#00E5FF","#2979FF","#7C4DFF","#00B8D9","#0091B5"];
const SC=["#B9FF66","#8FD43A","#65AA10","#3B7F00","#A3E635"];
const CAT={Kripto:"#00E5FF",Saham:"#B9FF66",Emas:"#FFD166",Tabungan:"#FF6B6B",Cash:"#A78BFA"};
const NAVS=[{id:'overview',ic:'⊞',lb:'Porto'},{id:'kripto',ic:'◈',lb:'Kripto'},{id:'saham',ic:'▲',lb:'Saham'},{id:'lainnya',ic:'◎',lb:'Lainnya'}];
const DEF={
  crypto:[{id:"bitcoin",symbol:"BTC",name:"Bitcoin",amount:0.05},{id:"ethereum",symbol:"ETH",name:"Ethereum",amount:0.8},{id:"solana",symbol:"SOL",name:"Solana",amount:10}],
  saham:[{ticker:"BBCA",name:"BCA",shares:100,priceIDR:10050},{ticker:"TLKM",name:"Telkom",shares:500,priceIDR:3200},{ticker:"ASII",name:"Astra",shares:200,priceIDR:5225}],
  emas:{grams:50},tabungan:{principal:20000000,monthlyRate:0.008,months:6},cash:{amount:15000000},
};

/* ════════════════════════════════════════════
   STORAGE
════════════════════════════════════════════ */
const loadP=()=>{try{const s=localStorage.getItem('pf4');return s?JSON.parse(s):DEF;}catch{return DEF;}};
const saveP=p=>{try{localStorage.setItem('pf4',JSON.stringify(p));}catch{}};

/* ════════════════════════════════════════════
   FORMAT
════════════════════════════════════════════ */
const fi=n=>new Intl.NumberFormat('id-ID',{style:'currency',currency:'IDR',maximumFractionDigits:0}).format(n);
const fc=n=>{if(n>=1e12)return'Rp '+(n/1e12).toFixed(2)+' T';if(n>=1e9)return'Rp '+(n/1e9).toFixed(2)+' M';if(n>=1e6)return'Rp '+(n/1e6).toFixed(2)+' jt';return fi(n);};
const cpd=(p,r,m)=>p*Math.pow(1+r,m);

/* ════════════════════════════════════════════
   STATE
════════════════════════════════════════════ */
let S={p:loadP(),prices:{},gold:0,loading:true,updated:null,tab:'overview',editing:false,esec:'kripto',draft:null};

/* ════════════════════════════════════════════
   COMPUTE
════════════════════════════════════════════ */
function compute(){
  const{p,prices,gold}=S;
  const cv=p.crypto.map((c,i)=>{const pr=prices[c.id];const u=pr?.usd||0;return{...c,usd:u,val:u*USD_IDR*c.amount,ch:pr?.usd_24h_change||0,col:CC[i%CC.length]};});
  const sv=p.saham.map((s,i)=>({...s,val:s.shares*s.priceIDR,col:SC[i%SC.length]}));
  const ev=gold*p.emas.grams, tv=cpd(p.tabungan.principal,p.tabungan.monthlyRate,p.tabungan.months), cav=p.cash.amount;
  const tc=cv.reduce((a,x)=>a+x.val,0), ts=sv.reduce((a,x)=>a+x.val,0);
  const tot=tc+ts+ev+tv+cav||1;
  const catP=[
    {name:'Kripto',  val:tc, col:CAT.Kripto,  pct:tc/tot*100},
    {name:'Saham',   val:ts, col:CAT.Saham,   pct:ts/tot*100},
    {name:'Emas',    val:ev, col:CAT.Emas,    pct:ev/tot*100},
    {name:'Tabungan',val:tv, col:CAT.Tabungan,pct:tv/tot*100},
    {name:'Cash',    val:cav,col:CAT.Cash,    pct:cav/tot*100},
  ].filter(d=>d.val>0);
  const detP=[
    ...cv.map(c=>({name:c.symbol,val:c.val,col:c.col,pct:c.val/tot*100})),
    ...sv.map(s=>({name:s.ticker,val:s.val,col:s.col,pct:s.val/tot*100})),
    {name:'Emas',val:ev,col:CAT.Emas,pct:ev/tot*100},{name:'Tabungan',val:tv,col:CAT.Tabungan,pct:tv/tot*100},{name:'Cash',val:cav,col:CAT.Cash,pct:cav/tot*100},
  ].filter(d=>d.val>0);
  const wch=tc>0?cv.reduce((a,c)=>a+c.ch*c.val,0)/tot:0;
  return{cv,sv,ev,tv,cav,tc,ts,tot,catP,detP,wch};
}

/* ════════════════════════════════════════════
   CANVAS DONUT
════════════════════════════════════════════ */
function drawDonut(id,data){
  const el=document.getElementById(id);if(!el)return;
  const dpr=window.devicePixelRatio||1, W=el.offsetWidth, H=el.offsetHeight;
  if(!W||!H)return;
  el.width=W*dpr;el.height=H*dpr;
  const ctx=el.getContext('2d');ctx.scale(dpr,dpr);ctx.clearRect(0,0,W,H);
  const cx=W/2,cy=H/2,R=Math.min(W,H)*0.44,r=R*0.52;
  const tot=data.reduce((a,d)=>a+d.val,0)||1;
  let ang=-Math.PI/2;
  data.forEach(d=>{
    const sw=(d.val/tot)*Math.PI*2-0.025;if(sw<=0)return;
    ctx.beginPath();ctx.arc(cx,cy,R,ang,ang+sw);ctx.arc(cx,cy,r,ang+sw,ang,true);ctx.closePath();
    ctx.fillStyle=d.col;ctx.fill();ang+=sw+0.025;
  });
  // Inner glow
  const g=ctx.createRadialGradient(cx,cy,0,cx,cy,r);
  g.addColorStop(0,'#0D111755');g.addColorStop(1,'transparent');
  ctx.beginPath();ctx.arc(cx,cy,r-1,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
}

function setTab(t){S.tab=t;render();}
function openEdit(){S.draft=JSON.parse(JSON.stringify(S.p));S.editing=true;renderEdit();}
function closeEdit(){S.editing=false;S.draft=null;renderEdit();}
function esec(s){S.esec=s;renderEdit();}
function ei(id,v){
  if(!S.draft)return;const d=S.draft;
  if(id.startsWith('ci')){const i=+id[2],f=+id[3];const fs=['id','symbol','name','amount'];if(f===3)d.crypto[i].amount=parseFloat(v)||0;else d.crypto[i][fs[f]]=v;}
  else if(id.startsWith('si')){const i=+id[2],f=+id[3];const fs=['ticker','name','shares','priceIDR'];if(f>=2)d.saham[i][fs[f]]=parseFloat(v)||0;else d.saham[i][fs[f]]=v;}
  else if(id==='eg')d.emas.grams=parseFloat(v)||0;
  else if(id==='tp')d.tabungan.principal=parseFloat(v)||0;
  else if(id==='tr')d.tabungan.monthlyRate=parseFloat(v)||0;
  else if(id==='tm')d.tabungan.months=parseInt(v)||0;
  else if(id==='ca')d.cash.amount=parseFloat(v)||0;
}
function ac(){S.draft.crypto.push({id:'',symbol:'',name:'',amount:0});renderEdit();}
function dc(i){S.draft.crypto.splice(i,1);renderEdit();}
function as_(){S.draft.saham.push({ticker:'',name:'',shares:0,priceIDR:0});renderEdit();}
function ds(i){S.draft.saham.splice(i,1);renderEdit();}
function saveEdit(){S.p=JSON.parse(JSON.stringify(S.draft));saveP(S.p);S.editing=false;S.draft=null;render();setTimeout(fetchP,200);}

/* ════════════════════════════════════════════
   FETCH PRICES
════════════════════════════════════════════ */
async function fetchP(){
  S.loading=true;render();
  try{
    const ids=S.p.crypto.map(c=>c.id).filter(Boolean).join(',');
    const[cr,gr]=await Promise.allSettled([
      fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${ids}&vs_currencies=usd&include_24hr_change=true`),
      fetch('https://api.metals.live/v1/spot/gold'),
    ]);
    S.prices=cr.status==='fulfilled'&&cr.value.ok?await cr.value.json():{bitcoin:{usd:87500,usd_24h_change:1.2},ethereum:{usd:3400,usd_24h_change:-0.8},solana:{usd:185,usd_24h_change:2.1}};
    if(gr.status==='fulfilled'&&gr.value.ok){const g=await gr.value.json();S.gold=(g[0]?.price||2350)*USD_IDR/31.1035;}
    else S.gold=2350*USD_IDR/31.1035;
    S.updated=new Date();
  }catch{
    S.prices={bitcoin:{usd:87500,usd_24h_change:1.2},ethereum:{usd:3400,usd_24h_change:-0.8},solana:{usd:185,usd_24h_change:2.1}};
    S.gold=2350*USD_IDR/31.1035;S.updated=new Date();
  }
  S.loading=false;render();
}
function fetchPrices(){return fetchP();}
